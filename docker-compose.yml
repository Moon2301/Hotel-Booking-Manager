version: "3.9"

services:
  # ─────────────────────────────────────────
  # PostgreSQL 15
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: hotel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hotel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotel_secret}
      POSTGRES_DB: ${POSTGRES_DB:-hotel_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotel_user} -d ${POSTGRES_DB:-hotel_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel_net

  # ─────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hotel_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel_net

  # ─────────────────────────────────────────
  # Dev stack: migrate + seed + pnpm dev (turbo)
  # ─────────────────────────────────────────
  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: hotel_dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      DATABASE_URL: postgresql://${POSTGRES_USER:-hotel_user}:${POSTGRES_PASSWORD:-hotel_secret}@postgres:5432/${POSTGRES_DB:-hotel_db}
      API_INTERNAL_URL: http://127.0.0.1:3000
      API_PUBLIC_URL: http://localhost:3000
      CLIENT_URL: http://localhost:8080
      CLIENT_PAYMENT_PATH: /my-stay
      NEXT_PUBLIC_API_URL: ""
      CORS_ORIGINS: http://localhost:3001,http://localhost:8080,http://localhost:3000
      TURBO_UI: stream
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${API_PORT:-3000}:3000"
      - "${WEB_ADMIN_PORT:-3001}:3001"
      - "${WEB_CLIENT_PORT:-8080}:8080"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web-admin/node_modules
      - /app/apps/web-client/node_modules
      # Next.js dev cache on Linux volume (not Windows bind-mount — fixes chunk 404)
      - web_admin_next:/app/apps/web-admin/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hotel_net

  # ─────────────────────────────────────────
  # pgAdmin (optional)
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hotel_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@hotel.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin_secret}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hotel_net
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  web_admin_next:
networks:
  hotel_net:
    driver: bridge
